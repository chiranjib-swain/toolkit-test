name: Exclude Pattern Check

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout toolkit (main)
        uses: actions/checkout@v4
        with:
          repository: priyagupta108/toolkit
          ref: hashFiles-extended-options
          path: toolkit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toolkit/package-lock.json

      - name: Install root dependencies
        working-directory: toolkit
        run: npm ci

      - name: Bootstrap (link lerna packages)
        working-directory: toolkit
        run: npx lerna bootstrap

      - name: Build (generate packages/**/lib outputs)
        working-directory: toolkit
        run: npm run build

      - name: Functional check exclude patterns (node_modules, logs, dist)
        working-directory: toolkit
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$(pwd)"
      
          echo "Checking glob build output exists..."
          ls -la packages/glob
          ls -la packages/glob/lib
          test -f packages/glob/lib/glob.js
      
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "GITHUB_ACTION_PATH=${GITHUB_ACTION_PATH:-"(not set)"}"
      
          if [[ -z "${GITHUB_ACTION_PATH:-}" ]]; then
            export GITHUB_ACTION_PATH="$RUNNER_TEMP/fake-action-path"
          fi
      
          TEST_DIR_WS="$GITHUB_WORKSPACE/hashfiles-exclude-test"
          TEST_DIR_AP="$GITHUB_ACTION_PATH/hashfiles-exclude-test"
      
          rm -rf "$TEST_DIR_WS" "$TEST_DIR_AP"
      
          mkdir -p \
            "$TEST_DIR_WS/node_modules/pkg" \
            "$TEST_DIR_WS/src" \
            "$TEST_DIR_WS/dist" \
            "$TEST_DIR_AP/node_modules/pkg" \
            "$TEST_DIR_AP/dist"
      
          echo '{"where":"workspace-src"}' > "$TEST_DIR_WS/src/included.json"
      
          echo '{"where":"workspace-node_modules"}' > "$TEST_DIR_WS/node_modules/pkg/excluded.json"
          echo '{"where":"workspace-dist"}' > "$TEST_DIR_WS/dist/excluded.json"
          echo 'log entry' > "$TEST_DIR_WS/src/test.log"
      
          echo '{"where":"action-node_modules"}' > "$TEST_DIR_AP/node_modules/pkg/excluded-action.json"
          echo '{"where":"action-dist"}' > "$TEST_DIR_AP/dist/excluded-action.json"
          echo 'action log entry' > "$TEST_DIR_AP/test.log"
      
          python - <<'PY'
          from pathlib import Path
      
          content = r"""import { writeFileSync } from 'fs';
          const glob = await import('./packages/glob/lib/glob.js');
      
          const ws = process.env.GITHUB_WORKSPACE;
          const ap = process.env.GITHUB_ACTION_PATH;
      
          if (!ws) throw new Error('GITHUB_WORKSPACE is not set');
          if (!ap) throw new Error('GITHUB_ACTION_PATH is not set');
      
          const patterns = [
            `${ws}/hashfiles-exclude-test/**/*`,
            `${ap}/hashfiles-exclude-test/**/*`
          ].join('\n');
      
          const opts = {
            roots: [ws, ap],
            allowFilesOutsideWorkspace: true,
            exclude: [
              '**/node_modules/**',
              '**/*.log',
              'dist/**'
            ]
          };
      
          const h1 = await glob.hashFiles(patterns, '', opts);
          console.log('h1:', JSON.stringify(h1));
      
          // modify excluded files
          writeFileSync(`${ws}/hashfiles-exclude-test/node_modules/pkg/excluded.json`, '{"v":2}\n');
          writeFileSync(`${ws}/hashfiles-exclude-test/src/test.log`, 'changed\n');
          writeFileSync(`${ws}/hashfiles-exclude-test/dist/excluded.json`, '{"v":3}\n');
      
          const h2 = await glob.hashFiles(patterns, '', opts);
          console.log('h2:', JSON.stringify(h2));
      
          writeFileSync(`${ap}/hashfiles-exclude-test/node_modules/pkg/excluded-action.json`, '{"v":4}\n');
          writeFileSync(`${ap}/hashfiles-exclude-test/test.log`, 'changed-action\n');
          writeFileSync(`${ap}/hashfiles-exclude-test/dist/excluded-action.json`, '{"v":5}\n');
      
          const h3 = await glob.hashFiles(patterns, '', opts);
          console.log('h3:', JSON.stringify(h3));
      
          if (h1 !== h2 || h1 !== h3) {
            throw new Error("Exclude patterns failed; hash changed after modifying excluded files.");
          }
      
          console.log("OK: exclude patterns (**/node_modules/**, **/*.log, dist/**) prevented excluded changes from affecting the hash.");
          """
          Path("check-exclude-patterns.mjs").write_text(content, encoding="utf-8")
          PY
      
          node ./check-exclude-patterns.mjs
