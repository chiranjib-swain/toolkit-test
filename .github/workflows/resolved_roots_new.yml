name: New Resolved Roots

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout toolkit (main)
        uses: actions/checkout@v4
        with:
          repository: priyagupta108/toolkit
          ref: hashFiles-extended-options
          path: toolkit
          fetch-depth: 0


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toolkit/package-lock.json

      - name: Install root dependencies
        working-directory: toolkit
        run: npm ci

      - name: Lerna bootstrap (link local packages + install per-package deps)
        working-directory: toolkit
        run: npx lerna bootstrap --ci

      - name: Build
        working-directory: toolkit
        run: npm run build

      - name: Test (Jest from root, glob only)
        working-directory: toolkit
        run: npx jest packages/glob --runInBand

     # Title: Negative functional check for isInResolvedRoots (outside root is skipped unless allowFilesOutsideWorkspace=true)

      - name: Functional check isInResolvedRoots negative (outside root skipped unless allowFilesOutsideWorkspace=true)
        working-directory: toolkit
        shell: bash
        run: |
          set -euo pipefail
      
          mkdir -p "$RUNNER_TEMP/hashfiles-root-negative/allowed-root"
          mkdir -p "$RUNNER_TEMP/hashfiles-root-negative/outside-root"
      
          echo "ALLOWED" > "$RUNNER_TEMP/hashfiles-root-negative/allowed-root/allowed.txt"
          echo "OUTSIDE" > "$RUNNER_TEMP/hashfiles-root-negative/outside-root/outside.txt"
      
          cat > ./check-root-negative.mjs <<'EOF'
          const glob = await import('./packages/glob/lib/glob.js');
          const fs = await import('fs');
      
          const base = process.env.RUNNER_TEMP + '/hashfiles-root-negative';
          const allowedRoot = base + '/allowed-root';
          const outsideFile = base + '/outside-root/outside.txt';
      
          const patterns = outsideFile;
          const roots = [allowedRoot];
      
          console.log('patterns:', JSON.stringify(patterns));
          console.log('roots:', JSON.stringify(roots));
          console.log('resolvedOutsideFile:', fs.realpathSync(outsideFile));
          console.log('resolvedRoots:', JSON.stringify(roots.map(r => fs.realpathSync(r))));
      
          // Case 1: allowFilesOutsideWorkspace=false (default). File is outside roots => should be skipped => empty hash.
          const h1 = await glob.hashFiles(patterns, '', { roots, allowFilesOutsideWorkspace: false }, true);
          console.log('h1 (allowOutside=false):', JSON.stringify(h1));
          if (h1 !== '') {
            throw new Error('Expected empty hash when file is outside roots and allowFilesOutsideWorkspace=false.');
          }
      
          // Case 2: allowFilesOutsideWorkspace=true. Outside file should be INCLUDED => non-empty hash.
          const h2 = await glob.hashFiles(patterns, '', { roots, allowFilesOutsideWorkspace: true }, true);
          console.log('h2 (allowOutside=true):', JSON.stringify(h2));
          if (!h2) {
            throw new Error('Expected non-empty hash when file is outside roots and allowFilesOutsideWorkspace=true.');
          }
      
          console.log('OK: outside-root file is skipped by default, but included when allowFilesOutsideWorkspace=true.');
          EOF
      
          node ./check-root-negative.mjs
